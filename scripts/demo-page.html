<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MobileProto Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* ─── Shared shell ─── */
  .mp-desktop-shell {
    position: fixed;
    inset: 0;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 0;
  }

  .mp-phone-container {
    position: relative;
    width: 451px;
    height: 914px;
    flex-shrink: 0;
    z-index: 1;
  }

  .mp-phone-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 2;
    pointer-events: none;
  }

  .mp-screen-area {
    position: absolute;
    top: 18.88px;
    left: 22.34px;
    width: 401.66px;
    height: 869.24px;
    border-radius: 56.645px;
    overflow: hidden;
    z-index: 1;
    background: #000;
  }

  /* ─── Fake mobile app inside screen ─── */
  .fake-app {
    width: 100%;
    height: 100%;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
    color: #fff;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* Status bar */
  .status-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 28px 8px;
    font-size: 15px;
    font-weight: 600;
  }
  .status-bar .time { font-size: 16px; font-weight: 700; }
  .status-icons { display: flex; gap: 6px; align-items: center; }
  .status-icons svg { width: 18px; height: 18px; }

  /* App header */
  .app-header {
    padding: 8px 24px 16px;
  }
  .app-header h1 {
    font-size: 32px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.1;
  }

  /* Story circles */
  .stories {
    display: flex;
    gap: 14px;
    padding: 12px 24px;
    overflow-x: auto;
  }
  .story {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .story-ring {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    padding: 3px;
    background: linear-gradient(135deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
  }
  .story-avatar {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    border: 3px solid #000;
  }
  .story-name {
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    max-width: 64px;
    text-align: center;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Cards */
  .card {
    margin: 12px 20px;
    border-radius: 20px;
    overflow: hidden;
  }
  .card-image {
    width: 100%;
    height: 220px;
    object-fit: cover;
    display: block;
  }
  .card-body {
    padding: 16px 18px;
  }
  .card-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .card-subtitle {
    font-size: 13px;
    color: rgba(255,255,255,0.5);
  }
  .card-actions {
    display: flex;
    gap: 16px;
    padding: 8px 18px 16px;
  }
  .card-actions svg { width: 24px; height: 24px; }

  /* Tab bar */
  .tab-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 83px;
    display: flex;
    justify-content: space-around;
    align-items: flex-start;
    padding-top: 10px;
    border-top: 0.5px solid rgba(255,255,255,0.15);
    z-index: 5;
  }
  .tab-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    color: rgba(255,255,255,0.4);
  }
  .tab-item.active { color: #fff; }
  .tab-item svg { width: 24px; height: 24px; }
  .home-indicator {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 134px;
    height: 5px;
    border-radius: 3px;
    background: rgba(255,255,255,0.3);
  }

  /* Gradient placeholders */
  .gradient-1 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
  .gradient-2 { background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%); }
  .gradient-3 { background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%); }
  .avatar-1 { background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%); }
  .avatar-2 { background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%); }
  .avatar-3 { background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); }
  .avatar-4 { background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 100%); }
  .avatar-5 { background: linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%); }

  /* ─── Background presets ─── */
  .bg-dark { background: #0a0a0a; }
  .bg-gradient { background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 50%, #16213e 100%); }
  .bg-mesh {
    background:
      radial-gradient(at 20% 25%, #1a0533 0%, transparent 50%),
      radial-gradient(at 80% 80%, #0d1b2a 0%, transparent 50%),
      radial-gradient(at 50% 50%, #0a0a0a 0%, transparent 80%),
      #0a0a0a;
  }
  .bg-blur {
    background: radial-gradient(ellipse at 30% 50%, rgba(56, 56, 80, 0.6) 0%, #0a0a0a 70%);
  }
  .bg-light { background: #f5f5f5; }
</style>
</head>
<body>

const scale = parseFloat(params.get('scale') || '1');

<script>
  const shell = document.getElementById('shell');
  shell.className = 'mp-desktop-shell bg-' + preset;

  const phone = document.getElementById('phone');
  if (scale !== 1) {
    const marginV = -(914 * (1 - scale)) / 2;
    const marginH = -(451 * (1 - scale)) / 2;
    phone.style.transform = 'scale(' + scale + ')';
    phone.style.margin = marginV + 'px ' + marginH + 'px';
  }
</script>
